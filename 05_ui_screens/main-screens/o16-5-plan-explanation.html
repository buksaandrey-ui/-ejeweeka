<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code — O-16.5 Персональный разбор</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <script src="app-utils.js"></script>
  <style>
    .header { padding: 0 20px 12px 20px; flex-shrink: 0; }
    .header-title { font-size: 24px; font-weight: 800; color: var(--color-text-primary); }
    .header-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; line-height: 1.4; }
    /* Blocks */
    .block { background: var(--color-surface); border-radius: 20px; border: 1px solid var(--color-divider); padding: 20px; margin-bottom: 14px; }
    .block-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 12px; }
    .block-title { font-size: 16px; font-weight: 800; color: var(--color-text-primary); margin-bottom: 8px; }
    .block-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; }
    .block-text strong { color: var(--color-text-primary); font-weight: 700; }
    .block-highlight { background: #FFF7ED; border-radius: 12px; padding: 12px; margin-top: 12px; font-size: 13px; color: #92400E; font-weight: 600; line-height: 1.5; }
    .block-list { list-style: none; padding: 0; margin-top: 10px; }
    .block-list li { font-size: 13px; color: var(--color-text-secondary); padding: 6px 0; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; gap: 8px; }
    .block-list li:last-child { border: none; }
    .block-list .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-primary); flex-shrink: 0; }
    /* Warning block */
    .block.warning { border-color: #FED7AA; background: #FFFBEB; }
    .block.warning .block-title { color: #92400E; }
    /* Bottom */
    .btn-plan { width: 100%; height: 56px; border-radius: 16px; background: var(--color-primary-gradient); color: #FFF; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(245,146,43,0.3); }
    @media (max-width: 440px) {
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><div><i class="ph ph-wifi-high"></i> <i class="ph ph-battery-full"></i></div></div>

    <div class="header">
      <div class="header-title">Твой персональный разбор</div>
      <div class="header-sub">На основе твоих данных мы подготовили план</div>
    </div>

    <div class="content" id="content" style="padding-top:0"></div>

    <div class="bottom-cta">
      <button class="btn-plan" onclick="goToStatusWall()">Смотреть мой план → <i class="ph ph-arrow-right"></i></button>
    </div>
  </div>

<script>
  const s = getProfileSummary();
  const d = s._raw;
  let html = '';

  // Helper: filter out empty/negative values
  const isRealValue = (v) => v && v !== '—' && v !== 'Нет' && v !== 'нет' && v !== 'Не указано' && v !== 'Не знаю' && v !== 'none' && v !== 'Нет или не знаю';

  // === БЛОК 1: Профиль ===
  const bmiNum = parseFloat(d['ИМТ'] || s.bmi) || 0;
  let bmiClass = 'норма';
  if (bmiNum < 18.5) bmiClass = 'дефицит массы';
  else if (bmiNum >= 25 && bmiNum < 30) bmiClass = 'избыточный вес';
  else if (bmiNum >= 30) bmiClass = 'ожирение';

  html += `
    <div class="block">
      <div class="block-icon" style="background:#EFF6FF;color:#3B82F6;"><i class="ph ph-user-circle"></i></div>
      <div class="block-title">Твой профиль</div>
      <div class="block-text">
        <strong>${s.name || 'Пользователь'}</strong>, ${s.sex !== '—' ? s.sex.toLowerCase() : ''} ${d['Возраст'] ? d['Возраст'] + ' лет' : ''}.<br>
        Рост ${s.height}, вес ${s.weight}${s.waist !== '—' ? ', талия ' + s.waist : ''}.<br>
        ИМТ: <strong>${s.bmi}</strong> (${bmiClass}). Базовый обмен: <strong>${s.bmr}</strong>.
      </div>
      ${s.targetWeight ? `<div class="block-highlight">🎯 Цель: ${s.goal}. Целевой вес: ${s.targetWeight} за ${s.targetTimeline || 'оптимальный срок'}.</div>` : `<div class="block-highlight">🎯 Цель: ${s.goal}</div>`}
    </div>`;

  // === БЛОК 2: Принципы питания ===
  const mealInfo = s.mealPattern !== '—' ? `Режим: ${s.mealPattern}.` : '';
  const fastInfo = s.fastingStatus !== 'Нет' && s.fastingStatus !== 'none' && s.fastingStatus !== '—' ? ` Практикуешь голодание.` : '';
  const budgetNote = s.budget !== '—' ? `Бюджет: ${s.budget.toLowerCase()}.` : '';
  const cookNote = s.cookingTime !== '—' ? ` Готовка: ${s.cookingTime}.` : '';
  const countryNote = s.country !== '—' ? `Продукты подобраны с учётом доступности в ${s.country}${s.city !== '—' ? ', ' + s.city : ''}.` : '';

  html += `
    <div class="block">
      <div class="block-icon" style="background:#F0FDF4;color:#16A34A;"><i class="ph ph-bowl-food"></i></div>
      <div class="block-title">Принципы питания</div>
      <div class="block-text">
        ${mealInfo}${fastInfo} ${budgetNote}${cookNote}<br>
        ${countryNote}
      </div>
      <ul class="block-list">
        ${(s.restrictions.length > 0) ? s.restrictions.map(r => `<li><span class="dot"></span>${r}</li>`).join('') : '<li><span class="dot"></span>Без строгих ограничений</li>'}
        ${(s.excludedMeals.length > 0) ? s.excludedMeals.map(m => `<li><span class="dot"></span>Исключено: ${m}</li>`).join('') : ''}
      </ul>
    </div>`;

  // === БЛОК 3: Витамины ===
  const suppInfo = s.supplements ? `Ты принимаешь: ${s.supplements}.` : 'Витамины будут подобраны на основе анализов и симптомов.';
  const bloodInfo = Object.keys(s.bloodTests).length > 0 ? 
    `Учтены анализы: ${Object.values(s.bloodTests).map(t => t.label).join(', ')}.` : 
    'Анализы не указаны — рекомендации базовые.';

  html += `
    <div class="block">
      <div class="block-icon" style="background:#FEF3C7;color:#D97706;"><i class="ph ph-pill"></i></div>
      <div class="block-title">Витамины и добавки</div>
      <div class="block-text">${suppInfo}<br>${bloodInfo}</div>
      <div class="block-highlight">⏰ Расписание приёма будет составлено с учётом твоего режима сна (${s.sleepTime} — ${s.wakeTime}) и приёмов пищи.</div>
    </div>`;

  // === БЛОК 4: Тренировки ===
  const actInfo = s.activityFreq !== '—' ? s.activityFreq : 'Не указано';
  const typesInfo = s.activityTypes.length > 0 ? s.activityTypes.join(', ') : 'будут подобраны под твою цель';

  html += `
    <div class="block">
      <div class="block-icon" style="background:#EDE9FE;color:#7C3AED;"><i class="ph ph-barbell"></i></div>
      <div class="block-title">Тренировки</div>
      <div class="block-text">Частота: <strong>${actInfo}</strong>.<br>Виды: ${typesInfo}.</div>
    </div>`;

  // === БЛОК 5: Прогноз ===
  if (s.targetWeight) {
    html += `
      <div class="block">
        <div class="block-icon" style="background:#ECFDF5;color:#059669;"><i class="ph ph-trend-up"></i></div>
        <div class="block-title">Прогноз</div>
        <div class="block-text">При стабильном следовании плану ты можешь достичь <strong>${s.targetWeight}</strong> за <strong>${s.targetTimeline || 'оптимальный срок'}</strong>. Скорость зависит от метаболизма, активности и дисциплины.</div>
        <div class="block-highlight">📊 Еженедельный отчёт покажет прогресс и скорректирует план при необходимости.</div>
      </div>`;
  }

  // === БЛОК 6: Важные предупреждения ===
  const realConditions = s.conditions.filter(isRealValue);
  const realAllergies = s.allergies.filter(isRealValue);
  const hasMeds = isRealValue(s.medications);
  
  if (realConditions.length > 0 || hasMeds || realAllergies.length > 0) {
    html += `
      <div class="block warning">
        <div class="block-icon" style="background:#FEF3C7;color:#D97706;"><i class="ph ph-warning-circle"></i></div>
        <div class="block-title">⚠️ Важные предупреждения</div>
        <div class="block-text">На основе твоих данных мы учли следующее:</div>
        <ul class="block-list">
          ${realConditions.map(c => `<li><span class="dot"></span>${c} — план адаптирован</li>`).join('')}
          ${hasMeds ? `<li><span class="dot"></span>Приём лекарств учтён при составлении меню</li>` : ''}
          ${realAllergies.length > 0 ? `<li><span class="dot"></span>Аллергены полностью исключены: ${realAllergies.join(', ')}</li>` : ''}
        </ul>
      </div>`;
  }

  // === Барьеры ===
  const realBarriers = s.barriers.filter(isRealValue);
  if (realBarriers.length > 0) {
    html += `
      <div class="block">
        <div class="block-icon" style="background:#FEE2E2;color:#DC2626;"><i class="ph ph-shield-warning"></i></div>
        <div class="block-title">Стратегии против срывов</div>
        <div class="block-text">Ты указал(а) барьеры: <strong>${realBarriers.join(', ')}</strong>. План включает стратегии обхода для каждого из них.</div>
      </div>`;
  }

  document.getElementById('content').innerHTML = html;

  // Save viewed state
  if (window.AIDiet) window.AIDiet.saveField('plan_explanation_viewed', 'true');

  function goToStatusWall() {
    window.location.href = 'o17-statuswall.html';
  }
</script>
<script src="onboarding-state.js"></script>
</body>
</html>
