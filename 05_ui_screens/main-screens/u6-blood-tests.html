<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - U-6 Анализы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--color-divider); background: #FFFFFF; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; background: #FFFFFF; border: 1px solid var(--color-divider); color: var(--color-text-primary); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .save-btn { font-size: 14px; font-weight: 700; color: var(--color-primary); background: none; border: none; cursor: pointer; }
    .subtitle { font-size: 14px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin: 24px 0 12px 0; }
    .test-list { display: flex; flex-direction: column; gap: 12px; }
    .test-card { 
      background: #FFFFFF; border: 1px solid var(--color-divider); border-radius: 20px; padding: 16px; 
      display: flex; flex-direction: column; gap: 16px;
    }
    .test-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .test-info { flex: 1; }
    .test-name { font-size: 15px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 4px; }
    .test-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; }
    .input-row { display: flex; align-items: center; gap: 12px; }
    .unit { font-size: 14px; font-weight: 600; color: var(--color-text-secondary); min-width: 60px; }
    .empty-state { text-align: center; padding: 32px 20px; color: var(--color-text-secondary); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; color: var(--color-divider); }
    .empty-text { font-size: 14px; font-weight: 500; }
    @media (max-width: 440px) {
      .bottom-cta, .bottom-nav { position: fixed !important; }
    }
  </style>
  <script src="app-utils.js">
    // === PROFILE PRE-FILL from onboarding ===
    document.addEventListener("DOMContentLoaded", () => {
    const d = (window.AIDiet && window.AIDiet.getProfile) ? window.AIDiet.getProfile() : JSON.parse(localStorage.getItem('aidiet_profile') || '{}');
    if (d.blood_tests) {
      for (const [key, test] of Object.entries(d.blood_tests)) {
        const chip = document.querySelector(`.chip[data-key="${key}"]`);
        if (chip) chip.classList.add('active');
      }
    }

    });
</script>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph ph-cell-signal-medium"></i>
        <i class="ph ph-wifi-high"></i>
        <i class="ph ph-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="back-btn" onclick="history.back()" aria-label="Назад"><i class="ph ph-arrow-left"></i></button>
        <h1 class="header-title">Анализы</h1>
      </div>
      <button class="save-btn">Сохранить</button>
    </header>

    <!-- Content -->
    <div class="content">

      <div>
        <div class="subtitle">Результаты тестов</div>
        <div class="test-list">
          <!-- Glucose -->
          <div class="test-card">
            <div class="test-header">
              <div class="test-info">
                <div class="test-name">Глюкоза натощак</div>
                <div class="test-desc">Уровень сахара в крови утром до еды.</div>
              </div>
            </div>
            <div class="input-row">
              <input type="number" class="input-field" placeholder="0.0" value="5.2">
              <span class="unit">ммоль/л</span>
            </div>
          </div>

          <!-- Vitamin D -->
          <div class="test-card">
            <div class="test-header">
              <div class="test-info">
                <div class="test-name">Витамин D (25-OH)</div>
                <div class="test-desc">Критически важен для иммунитета и костей.</div>
              </div>
            </div>
            <div class="input-row">
              <input type="number" class="input-field" placeholder="0" value="28">
              <span class="unit">нг/мл</span>
            </div>
          </div>

          <!-- Ferritin -->
          <div class="test-card">
            <div class="test-header">
              <div class="test-info">
                <div class="test-name">Ферритин</div>
                <div class="test-desc">Запас железа в организме. Дефицит ведет к анемии.</div>
              </div>
            </div>
            <div class="input-row">
              <input type="number" class="input-field" placeholder="0" value="45">
              <span class="unit">нг/мл</span>
            </div>
          </div>
        </div>
      </div>

      <div class="empty-state">
        <div class="empty-icon"><i class="ph ph-plus-circle"></i></div>
        <div class="empty-text">Добавить результаты других тестов</div>
      </div>

    </div>

  </div>
<script src="onboarding-state.js"></script>
</body>
</html>
