<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>O-17 Variant 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .v-card { background: var(--color-surface); border: 1.5px solid var(--color-divider); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; opacity: 0.6; }
    .v-card.active { border-color: var(--color-primary); box-shadow: 0 4px 15px rgba(245,146,43,0.15); opacity: 1; position: relative; }
    .v-badge { position: absolute; top: -10px; right: 16px; background: var(--color-primary-gradient); color: #FFF; font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 8px; }
    .v-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
    .v-icon.base { background: #F3F4F6; color: #9CA3AF; }
    .v-icon.black { background: #111827; color: #FFF; }
    .v-icon.gold { background: linear-gradient(135deg, #F5922B, #E85D04); color: #FFF; }
    .v-info { flex: 1; }
    .v-name { font-size: 16px; font-weight: 800; color: var(--color-text-primary); }
    .v-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
    .gift-box { background: #FFF7ED; border: 1.5px dashed #FED7AA; border-radius: 16px; padding: 16px; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><div><i class="ph ph-wifi-high"></i> <i class="ph ph-battery-full"></i></div></div>
    <div class="content">
      <div style="text-align: center; margin: 20px 0 30px;">
        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Твой план готов! 🎉</h1>
        <p style="color: var(--color-text-secondary); font-size: 14px;">Посмотри, какие уровни доступа существуют в Health Code.</p>
      </div>

      <div class="v-card">
        <div class="v-icon base">F</div>
        <div class="v-info">
          <div class="v-name">Статус Base</div>
          <div class="v-desc">Базовый дневник и трекинг веса</div>
        </div>
      </div>
      <div class="v-card">
        <div class="v-icon black">B</div>
        <div class="v-info">
          <div class="v-name">Статус Black</div>
          <div class="v-desc">AI-отчёты и рецепты</div>
        </div>
      </div>
      <div class="v-card active">
        <div class="v-badge">АКТИВИРОВАНО</div>
        <div class="v-icon gold">G</div>
        <div class="v-info">
          <div class="v-name">Статус Gold</div>
          <div class="v-desc">Всё включено + Фото-анализ блюд</div>
        </div>
      </div>

      <div class="gift-box">
        <div style="font-size: 24px; margin-bottom: 8px;">🎁</div>
        <div style="font-size: 15px; font-weight: 700; color: var(--color-primary);">У тебя активирован Статус Gold</div>
        <div style="font-size: 12px; color: var(--color-text-secondary); margin-top: 4px;">Первые 72 часа — полный доступ</div>
      </div>

      <div style="flex: 1;"></div>
      <button class="btn-primary" style="margin-top: 24px;">Поехали! <i class="ph ph-arrow-right"></i></button>
    </div>
  </div>

<script>
// Универсальный фильтр фичей статуса
document.addEventListener('DOMContentLoaded', () => {
    try {
        const raw = localStorage.getItem('aidiet_profile');
        if (!raw) return;
        const p = JSON.parse(raw);
        
        const _meds = p['takes_medications'] || p['takes_medication']; const noMeds = (!_meds || _meds === 'Нет' || _meds === 'false');
        const _supps = p['currently_takes_supplements'] || p['takes_supplements']; const noSupps = (!_supps || _supps === 'Нет' || _supps === 'false');
        const actFreq = p['activity_frequency'];
        const noTrain = (!actFreq || actFreq === 'Не готов(а) сейчас' || actFreq === 'Не готов сейчас');

        const walkDOM = (node, func) => {
            func(node);
            node = node.firstChild;
            while (node) {
                walkDOM(node, func);
                node = node.nextSibling;
            }
        };

        walkDOM(document.body, (node) => {
            if (node.nodeType === 3) { // Text node
                const text = node.nodeValue.toLowerCase();
                
                // Лекарства -> заменяем
                if (noMeds && text.includes('лекарств') && text.includes('совместимость')) {
                    node.nodeValue = 'Интеграция с Health Connect и трекерами активности';
                }
                
                // Витамины -> скрываем родителя
                if (noSupps && (text.includes('витаминов') || text.includes('бадов')) && !node.parentElement.closest('#dynamicPlanBullet')) {
                    // Ищем ближайший контейнер-строку (обычно div)
                    const row = node.parentElement.closest('div');
                    if (row && row.children.length > 0 && row.innerText.length < 100) {
                        row.style.display = 'none';
                    }
                }
                
                // Тренировки -> скрываем родителя
                if (noTrain && text.includes('тренировк') && !node.parentElement.closest('#dynamicPlanBullet')) {
                    const row = node.parentElement.closest('div');
                    if (row && row.children.length > 0 && row.innerText.length < 100) {
                        row.style.display = 'none';
                    }
                }
            }
        });
    } catch(e) {
        console.warn('Error in status feature filter', e);
    }
});
</script>
</body>
</html>
