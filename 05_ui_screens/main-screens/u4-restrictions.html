<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - U-4 Ограничения</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--color-divider); background: #FFFFFF; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; background: #FFFFFF; border: 1px solid var(--color-divider); color: var(--color-text-primary); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .save-btn { font-size: 14px; font-weight: 700; color: var(--color-primary); background: none; border: none; cursor: pointer; }
    .subtitle { font-size: 14px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .list-group { background: #FFFFFF; border: 1px solid var(--color-divider); border-radius: 20px; overflow: hidden; }
    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #F3F4F6; cursor: pointer; }
    .list-item:last-child { border-bottom: none; }
    .list-label { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
    .checkbox-round { width: 24px; height: 24px; border: 2px solid var(--color-divider); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: transparent; transition: all 0.2s; }
    .list-item.active .checkbox-round { background: var(--color-primary); border-color: var(--color-primary); color: #FFFFFF; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .text-input { width: 100%; height: 52px; padding: 0 16px; border-radius: 14px; border: 1px solid var(--color-divider); background: #FFFFFF; font-size: 15px; font-family: 'Inter', sans-serif; }
    @media (max-width: 440px) {
      .bottom-cta, .bottom-nav { position: fixed !important; }
    }
  </style>
  <script src="app-utils.js"></script>
  <script src="u-series-state.js"></script>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph ph-cell-signal-medium"></i>
        <i class="ph ph-wifi-high"></i>
        <i class="ph ph-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="back-btn" onclick="history.back()" aria-label="Назад"><i class="ph ph-arrow-left"></i></button>
        <h1 class="header-title">Ограничения</h1>
      </div>
      <button class="save-btn">Сохранить</button>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Diet Type -->
      <section>
        <div class="subtitle">Тип питания</div>
        <div class="list-group">
          <div class="list-item">
            <span class="list-label">Нет ограничений</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item active">
            <span class="list-label">Вегетарианство</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item">
            <span class="list-label">Веганство</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item">
            <span class="list-label">Кето-диета</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
        </div>
      </section>

      <!-- Allergies -->
      <section>
        <div class="subtitle">Аллергии</div>
        <div class="list-group">
          <div class="list-item active">
            <span class="list-label">Орехи и арахис</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item">
            <span class="list-label">Морепродукты</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item">
            <span class="list-label">Лактоза</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item active">
            <span class="list-label">Глютен</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
          <div class="list-item">
            <span class="list-label">Цитрусовые</span>
            <div class="checkbox-round"><i class="ph ph-check"></i></div>
          </div>
        </div>
      </section>

      <!-- Custom -->
      <section class="input-group">
        <div class="subtitle">Что ещё исключить?</div>
        <input type="text" class="text-input" placeholder="Например: сельдерей, кинзу...">
      </section>

    </div>

  </div>
</body>
</html>
