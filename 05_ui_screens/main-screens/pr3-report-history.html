<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - PR-3 История отчётов</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--color-divider); }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; background: #FFFFFF; border: 1px solid var(--color-divider); color: var(--color-text-primary); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .history-card {
      background: #FFFFFF;
      border: 1px solid var(--color-divider);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .history-card:active { transform: scale(0.98); }
    .date-box { width: 56px; height: 56px; border-radius: 14px; background: #F3F4F6; display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.1; }
    .date-day { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .date-month { font-size: 10px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; }
    .report-info { flex: 1; }
    .report-title { font-size: 15px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 2px; }
    .report-stats { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
    .trend-up { color: var(--color-success); }
    .trend-down { color: #EF4444; }
    .score-badge { 
      padding: 8px 12px; 
      border-radius: 10px; 
      font-size: 16px; 
      font-weight: 800; 
      color: #FFFFFF; 
      display: flex; 
      align-items: center; 
      gap: 4px;
    }
    .score-high { background: var(--color-success); }
    .score-mid { background: var(--color-warning); }
    @media (max-width: 440px) {
      .bottom-cta, .bottom-nav { position: fixed !important; }
    }
  </style>
  <script src="app-utils.js"></script>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph ph-cell-signal-medium"></i>
        <i class="ph ph-wifi-high"></i>
        <i class="ph ph-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <button class="back-btn" onclick="history.back()" aria-label="Назад"><i class="ph ph-arrow-left"></i></button>
      <h1 class="header-title">Архив отчётов</h1>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Week 1 -->
      <div class="history-card" onclick="location.href='pr2-ai-report.html'">
        <div class="date-box">
          <div class="date-day">14</div>
          <div class="date-month">Апр</div>
        </div>
        <div class="report-info">
          <div class="report-title">Неделя 15 (8-14 апр)</div>
          <div class="report-stats">
            <span>-1.2 кг</span>
            <span class="trend-up"><i class="ph ph-caret-up-bold"></i> +5 баллов</span>
          </div>
        </div>
        <div class="score-badge score-high">84</div>
      </div>

      <!-- Week 2 -->
      <div class="history-card">
        <div class="date-box">
          <div class="date-day">07</div>
          <div class="date-month">Апр</div>
        </div>
        <div class="report-info">
          <div class="report-title">Неделя 14 (1-7 апр)</div>
          <div class="report-stats">
            <span>-0.8 кг</span>
            <span class="trend-mid"><i class="ph ph-caret-circle-double-right"></i> Стабильно</span>
          </div>
        </div>
        <div class="score-badge score-high">79</div>
      </div>

      <!-- Week 3 -->
      <div class="history-card">
        <div class="date-box">
          <div class="date-day">31</div>
          <div class="date-month">Мар</div>
        </div>
        <div class="report-info">
          <div class="report-title">Неделя 13 (25-31 мар)</div>
          <div class="report-stats">
            <span>-0.5 кг</span>
            <span class="trend-down"><i class="ph ph-caret-down-bold"></i> -2 балла</span>
          </div>
        </div>
        <div class="score-badge score-mid">71</div>
      </div>

      <!-- Week 4 -->
      <div class="history-card">
        <div class="date-box">
          <div class="date-day">24</div>
          <div class="date-month">Мар</div>
        </div>
        <div class="report-info">
          <div class="report-title">Неделя 12 (18-24 мар)</div>
          <div class="report-stats">
            <span>-1.5 кг</span>
            <span class="trend-up"><i class="ph ph-caret-up-bold"></i> +8 баллов</span>
          </div>
        </div>
        <div class="score-badge score-high">73</div>
      </div>

    </div>

  </div>
</body>
</html>
