<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - U-2 Личные данные</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--color-divider); background: #FFFFFF; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; background: #FFFFFF; border: 1px solid var(--color-divider); color: var(--color-text-primary); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }
    .save-btn { font-size: 14px; font-weight: 700; color: var(--color-primary); background: none; border: none; cursor: pointer; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    /* Form Fields */
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .label { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
    .input { width: 100%; height: 52px; background: #FFFFFF; border: 1px solid var(--color-divider); border-radius: 14px; padding: 0 16px; font-size: 16px; font-family: 'Inter', sans-serif; color: var(--color-text-primary); outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: var(--color-primary); }
    .input-suffix { position: absolute; right: 16px; top: 16px; font-size: 14px; font-weight: 600; color: var(--color-text-secondary); }
    /* Selection Grids */
    .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .select-item { 
      padding: 14px; background: #FFFFFF; border: 1px solid var(--color-divider); 
      border-radius: 14px; text-align: center; font-size: 14px; font-weight: 600; 
      color: var(--color-text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .select-item.active { background: #FFF7ED; border-color: var(--color-primary); color: var(--color-primary); }
    /* Values Display */
    .metrics-card { background: #F3F4F6; border-radius: 20px; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .metric-item { display: flex; flex-direction: column; gap: 4px; }
    .metric-label { font-size: 11px; font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; }
    .metric-val { font-size: 20px; font-weight: 800; color: var(--color-text-primary); }
    .metric-status { font-size: 12px; font-weight: 600; color: #52B044; }
    @media (max-width: 440px) {
      .bottom-cta, .bottom-nav { position: fixed !important; }
    }
  </style>
  <script src="app-utils.js"></script>
  <script src="u-series-state.js"></script>
  <script>
    // U.1 FIX: Use canonical Russian keys from aidiet_profile
    document.addEventListener("DOMContentLoaded", () => {
        const d = (window.AIDiet && window.AIDiet.getProfile) ? window.AIDiet.getProfile() : JSON.parse(localStorage.getItem('aidiet_profile') || '{}');
        const weight = parseFloat(d['Текущий вес']);
        const height = parseFloat(d['Рост']);
        const age = parseInt(d['Возраст']);
        const gender = (d['Пол'] || '').includes('Женск') ? 'female' : 'male';

        if (weight && height) {
            const bmi = (weight / Math.pow(height / 100, 2)).toFixed(1);
            let status = 'Норма'; let color = '#52B044';
            if (bmi < 18.5) { status = 'Дефицит'; color = '#F5922B'; }
            else if (bmi >= 25 && bmi < 30) { status = 'Избыточный вес'; color = '#F5922B'; }
            else if (bmi >= 30) { status = 'Ожирение'; color = '#DC2626'; }
            
            const bmiEl = document.querySelector('.metric-val');
            if (bmiEl) bmiEl.innerText = bmi;
            const statusEl = document.querySelector('.metric-status');
            if (statusEl) { statusEl.innerText = status; statusEl.style.color = color; }
        }

        if (weight && height && age) {
            const bmr = gender === 'female'
                ? Math.round(10 * weight + 6.25 * height - 5 * age - 161)
                : Math.round(10 * weight + 6.25 * height - 5 * age + 5);
            const bmrEls = document.querySelectorAll('.metric-val');
            if (bmrEls[1]) bmrEls[1].innerText = bmr;
        }
    });
  </script>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph ph-cell-signal-medium"></i>
        <i class="ph ph-wifi-high"></i>
        <i class="ph ph-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <button class="back-btn" onclick="history.back()" aria-label="Назад"><i class="ph ph-arrow-left"></i></button>
        <h1 class="header-title">Данные и цель</h1>
      </div>
      <button class="save-btn">Сохранить</button>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- Goal -->
      <section>
        <div class="section-title">Главная цель</div>
        <div class="select-grid">
          <div class="select-item active">Снизить вес</div>
          <div class="select-item">Набрать массу</div>
          <div class="select-item">Здоровое тело</div>
          <div class="select-item">Энергия</div>
        </div>
      </section>

      <!-- Personal Info -->
      <section>
        <div class="section-title">О себе</div>
        <div class="form-group">
          <label class="label">Имя</label>
          <input type="text" class="input" value="Андрей" placeholder="Имя">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label class="label">Пол</label>
            <div style="display: flex; gap: 8px;">
                <div class="select-item active" style="flex: 1;">М</div>
                <div class="select-item" style="flex: 1;">Ж</div>
            </div>
          </div>
          <div class="form-group">
            <label class="label">Возраст</label>
            <input type="number" class="input" value="34" placeholder="Возраст">
          </div>
        </div>
      </section>

      <!-- Body Params -->
      <section>
        <div class="section-title">Параметры тела</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label class="label">Рост</label>
            <div class="input-wrapper">
              <input type="number" class="input" value="182" placeholder="Рост">
              <span class="input-suffix">см</span>
            </div>
          </div>
          <div class="form-group">
            <label class="label">Вес</label>
            <div class="input-wrapper">
              <input type="number" class="input" value="84" placeholder="Вес">
              <span class="input-suffix">кг</span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="label">Обхват талии (опционально)</label>
          <div class="input-wrapper">
            <input type="number" class="input" value="94" placeholder="Обхват">
            <span class="input-suffix">см</span>
          </div>
        </div>
      </section>

      <!-- Calculated Metrics -->
      <section>
        <div class="section-title">Текущие показатели</div>
        <div class="metrics-card">
          <div class="metric-item">
            <span class="metric-label">Твой ИМТ (индекс массы тела)</span>
            <span class="metric-val">25.4</span>
            <span class="metric-status" style="color: #F5922B;">Избыточный вес</span>
          </div>
          <div class="metric-item">
            <span class="metric-label">BMR (Покой)</span>
            <span class="metric-val">1840</span>
            <span class="metric-status">ккал/день</span>
          </div>
        </div>
      </section>

      <!-- Danger Zone -->
      <section style="margin-top: 32px; margin-bottom: 32px;">
        <button onclick="if(confirm('Вы уверены, что хотите безвозвратно удалить свой профиль и все данные с устройства? Это действие нельзя отменить.')) { localStorage.clear(); window.location.href='index.html'; }" style="width: 100%; padding: 16px; border-radius: 14px; background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center;">Удалить профиль и данные</button>
      </section>

    </div>

  </div>
<script src="onboarding-state.js"></script>
</body>
</html>
