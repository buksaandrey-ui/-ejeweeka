<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - HC-1 Health Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header{padding:16px 20px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--color-divider)}
    .back-btn{width:40px;height:40px;border-radius:12px;background:#FFF;border:1px solid var(--color-divider);color:var(--color-text-primary);display:flex;justify-content:center;align-items:center;font-size:20px;cursor:pointer}
    .header-title{font-size:18px;font-weight:700;color:var(--color-text-primary)}
    .subtitle{font-size:12px;font-weight:700;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
    .integr-card{background:#FFF;border:1px solid var(--color-divider);border-radius:24px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
    .integr-icon{width:64px;height:64px;border-radius:16px;display:flex;justify-content:center;align-items:center;font-size:32px}
    .integr-icon.apple{background:#FEF2F2;color:#EF4444}
    .integr-icon.google{background:#EBF5FF;color:#2563EB}
    .integr-name{font-size:20px;font-weight:700;color:var(--color-text-primary)}
    .integr-status{padding:6px 12px;border-radius:10px;font-size:12px;font-weight:700}
    .status-on{background:#E8F5E2;color:#52B044}
    .status-off{background:#F3F4F6;color:#9CA3AF}
    .last-sync{font-size:12px;color:var(--color-text-secondary);font-weight:500}
    .settings-group{background:#FFF;border:1px solid var(--color-divider);border-radius:20px;overflow:hidden}
    .setting-item{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #F3F4F6}
    .setting-item:last-child{border-bottom:none}
    .setting-label{display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600;color:var(--color-text-primary)}
    .setting-label i{font-size:20px;color:var(--color-primary);width:24px;text-align:center}
    .toggle{width:44px;height:24px;background:#E5E7EB;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle.active{background:var(--color-primary)}
    .toggle-circle{width:20px;height:20px;background:#FFF;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .toggle.active .toggle-circle{transform:translateX(20px)}
    .btn-sync{width:100%;height:56px;border-radius:16px;background:var(--color-primary-gradient);color:#FFF;border:none;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(245,146,43,.3)}
    .btn-disconnect{text-align:center;color:#EF4444;font-size:14px;font-weight:600;padding:12px;cursor:pointer;border:none;background:none;width:100%}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:#166534;color:#FFF;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;z-index:100}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
  <script src="app-utils.js"></script>
</head>
<body data-screen="hc1">
  <div class="phone">
    <div class="status-bar"><span>9:41</span><div class="status-bar-icons"><i class="ph ph-cell-signal-medium"></i><i class="ph ph-wifi-high"></i><i class="ph ph-battery-full"></i></div></div>
    <header class="header">
      <button class="back-btn" onclick="history.back()"><i class="ph ph-arrow-left"></i></button>
      <h1 class="header-title">Синхронизация данных</h1>
    </header>
    <div class="content">
      <section class="integr-card">
        <div class="integr-icon apple"><i class="ph ph-heart-fill"></i></div>
        <div class="integr-name" id="platformName">Apple Health</div>
        <div class="integr-status status-on" id="statusBadge">Подключено</div>
        <div class="last-sync" id="lastSync">Последняя синхронизация: сегодня, 09:24</div>
      </section>
      <div>
        <div class="subtitle">Передавать данные</div>
        <div class="settings-group">
          <div class="setting-item"><div class="setting-label"><i class="ph ph-moon"></i> Сон</div><div class="toggle active" data-key="hc_sleep"><div class="toggle-circle"></div></div></div>
          <div class="setting-item"><div class="setting-label"><i class="ph ph-sneaker"></i> Шаги</div><div class="toggle active" data-key="hc_steps"><div class="toggle-circle"></div></div></div>
          <div class="setting-item"><div class="setting-label"><i class="ph ph-barbell"></i> Тренировки</div><div class="toggle active" data-key="hc_workouts"><div class="toggle-circle"></div></div></div>
          <div class="setting-item"><div class="setting-label"><i class="ph ph-scales"></i> Вес</div><div class="toggle active" data-key="hc_weight"><div class="toggle-circle"></div></div></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn-sync" onclick="syncNow()">Синхронизировать сейчас</button>
        <button class="btn-disconnect" onclick="disconnect()">Отключить Apple Health</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script>
  // Toggle click handlers
  document.querySelectorAll('.toggle').forEach(t => {
    t.addEventListener('click', () => {
      t.classList.toggle('active');
      saveHCState();
    });
  });

  // Hydrate from profile
  const profile = window.AIDiet ? window.AIDiet.getProfile() : JSON.parse(localStorage.getItem('aidiet_profile') || '{}');
  document.querySelectorAll('.toggle[data-key]').forEach(t => {
    const saved = profile[t.dataset.key];
    if (saved === 'false' || saved === false) t.classList.remove('active');
  });
  const hcStatus = profile['health_connect_status'] || 'connected';
  if (hcStatus === 'disconnected') {
    document.getElementById('statusBadge').textContent = 'Не подключено';
    document.getElementById('statusBadge').className = 'integr-status status-off';
    document.getElementById('lastSync').textContent = '';
  }

  function saveHCState() {
    document.querySelectorAll('.toggle[data-key]').forEach(t => {
      if (window.AIDiet) window.AIDiet.saveField(t.dataset.key, String(t.classList.contains('active')));
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function syncNow() {
    if (window.AIDiet) window.AIDiet.saveField('hc_last_sync', new Date().toISOString());
    document.getElementById('lastSync').textContent = 'Последняя синхронизация: только что';
    showToast('✅ Данные синхронизированы');
  }

  function disconnect() {
    if (!confirm('Отключить Apple Health? Импорт данных будет приостановлен.')) return;
    if (window.AIDiet) window.AIDiet.saveField('health_connect_status', 'disconnected');
    document.getElementById('statusBadge').textContent = 'Не подключено';
    document.getElementById('statusBadge').className = 'integr-status status-off';
    document.getElementById('lastSync').textContent = '';
    showToast('Apple Health отключён');
  }
</script>
<script src="onboarding-state.js"></script>
</body>
</html>
