<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Health Code - U-13 Цветовая схема</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .header { padding: 16px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--color-divider); background: var(--color-surface); }
    .back-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--color-surface); border: 1px solid var(--color-divider); color: var(--color-text-primary); display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--color-text-primary); }

    .section-label { 
      font-size: 12px; font-weight: 700; color: var(--color-text-secondary); 
      text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; 
    }

    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .theme-card { 
      background: var(--color-card-bg, #FFF); border: 2px solid var(--color-divider); 
      border-radius: 20px; padding: 10px; cursor: pointer; 
      transition: all 0.25s ease; position: relative; overflow: hidden;
    }
    .theme-card:active { transform: scale(0.97); }
    .theme-card.active { border-color: var(--color-primary); box-shadow: 0 4px 16px rgba(var(--color-primary-rgb, 245,146,43), 0.15); }
    .theme-card.locked { opacity: 0.55; cursor: default; }
    .theme-card.locked:active { transform: none; }

    /* Preview mini-dashboard */
    .theme-preview {
      width: 100%; height: 110px; border-radius: 14px; position: relative; 
      overflow: hidden; margin-bottom: 10px; 
    }
    .preview-header { height: 22px; display: flex; align-items: center; padding: 0 8px; gap: 4px; }
    .preview-dot { width: 5px; height: 5px; border-radius: 50%; }
    .preview-body { padding: 6px 8px; }
    .preview-ring { 
      width: 36px; height: 36px; border-radius: 50%; border: 3px solid; 
      margin: 0 auto 4px; display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 700;
    }
    .preview-bars { display: flex; gap: 3px; margin-top: 4px; }
    .preview-bar { height: 4px; border-radius: 2px; flex: 1; }
    .preview-card-mock { height: 14px; border-radius: 4px; margin-top: 3px; }

    /* Info */
    .theme-info { text-align: center; padding: 0 4px; }
    .theme-name { font-size: 13px; font-weight: 700; color: var(--color-text-primary); margin-bottom: 1px; }
    .theme-tier-badge { 
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 3px;
    }
    .badge-base { background: #E5E7EB; color: #6B7280; }
    .badge-black { background: #1A1A1A; color: #FFFFFF; }
    .badge-gold { background: linear-gradient(135deg, #FFD700, #B8860B); color: #1A1A00; }

    /* Lock overlay */
    .lock-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
      background: rgba(255,255,255,0.5); backdrop-filter: blur(1px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 18px; z-index: 2;
    }
    .lock-icon { font-size: 24px; color: #6B7280; margin-bottom: 4px; }
    .lock-text { font-size: 10px; font-weight: 700; color: #6B7280; }

    /* Active check */
    .active-check { 
      position: absolute; top: -2px; right: -2px; width: 26px; height: 26px; 
      background: var(--color-primary); border-radius: 0 18px 0 12px;
      display: none; justify-content: center; align-items: center; 
      color: #FFF; font-size: 14px; z-index: 3;
    }
    .theme-card.active .active-check { display: flex; }

    /* Bottom */
    .bottom-cta { padding: 16px 20px 34px; }
    .apply-btn {
      width: 100%; height: 56px; border-radius: 16px; border: none;
      background: var(--color-primary-gradient); color: #FFF;
      font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 15px rgba(var(--color-primary-rgb, 245,146,43), 0.3);
      transition: all 0.2s;
    }
    .apply-btn:disabled { background: #D1D5DB; color: #9CA3AF; cursor: default; box-shadow: none; }

    .season-badge { 
      font-size: 10px; color: var(--color-text-secondary); text-align: center; 
      margin-top: 2px; 
    }

    /* Bottom nav */
    .bottom-nav { 
      position: absolute; bottom: 0; left: 0; right: 0; 
      background: var(--color-tab-bar-bg, rgba(255,255,255,0.92)); 
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--color-divider); padding: 8px 0 28px;
      display: flex; justify-content: space-around; z-index: 10;
    }
    .nav-item { 
      display: flex; flex-direction: column; align-items: center; gap: 3px; 
      text-decoration: none; color: var(--color-text-secondary); font-size: 10px; font-weight: 600;
    }
    .nav-item.active { color: var(--color-primary); }
    .nav-item i { font-size: 22px; }

    @media (max-width: 440px) {
      .bottom-nav { position: fixed !important; }
    }
  </style>
  <script src="app-utils.js"></script>
  <script src="onboarding-state.js"></script>
  <script src="theme-engine.js"></script>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph ph-cell-signal-medium"></i>
        <i class="ph ph-wifi-high"></i>
        <i class="ph ph-battery-full"></i>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <button class="back-btn" onclick="location.href='u1-profile-main.html'" aria-label="Назад"><i class="ph ph-arrow-left"></i></button>
      <h1 class="header-title">Цветовая схема</h1>
    </header>

    <!-- Content -->
    <div class="content" id="themesContent" style="padding-bottom: 180px;"></div>

    <!-- Apply Button -->
    <div class="bottom-cta" style="bottom: 68px;">
      <button class="apply-btn" id="applyBtn" disabled onclick="applyTheme()">Применить</button>
    </div>

    <!-- Tab Bar -->
    <nav class="bottom-nav">
      <a href="h1-dashboard.html" class="nav-item"><i class="ph ph-house"></i><span>Главная</span></a>
      <a href="p1-weekly-plan.html" class="nav-item"><i class="ph ph-fork-knife"></i><span>План</span></a>
      <a href="s1-shopping-list.html" class="nav-item"><i class="ph ph-shopping-cart"></i><span>Покупки</span></a>
      <a href="pr1-progress.html" class="nav-item"><i class="ph ph-chart-line-up"></i><span>Прогресс</span></a>
      <a href="u1-profile-main.html" class="nav-item active"><i class="ph ph-user-circle"></i><span>Профиль</span></a>
    </nav>
  </div>

  <script>
    // Preview color configs for each theme (simplified palette for mini-dashboard)
    const previewColors = {
      light:       { bg: '#FAFAFA', header: '#FFF', accent: '#F5922B', text: '#1A1A1A', muted: '#E5E7EB', card: '#FFF' },
      dark:        { bg: '#121212', header: '#1E1E1E', accent: '#F5922B', text: '#E8E8E8', muted: '#2D2D2D', card: '#1E1E1E' },
      ocean:       { bg: '#F0F8FF', header: '#FFF', accent: '#0077B6', text: '#0A2540', muted: '#C8E0F0', card: '#FFF' },
      sunset:      { bg: '#FFFAF5', header: '#FFF', accent: '#E85D04', text: '#2D1600', muted: '#F0D9C4', card: '#FFF' },
      forest:      { bg: '#F0FDF4', header: '#FFF', accent: '#2D6A4F', text: '#1B2E20', muted: '#C8E6C9', card: '#FFF' },
      gold_status: { bg: '#0D0D0D', header: '#1A1A1A', accent: '#D4AF37', text: '#F5F0E1', muted: '#2A2520', card: '#1A1A1A' },
      seasonal:    { bg: '#F9FFF0', header: '#FFF', accent: '#7CB342', text: '#1B3A00', muted: '#DCEDC8', card: '#FFF' }
    };

    const seasonNames = { spring: 'Весна 🌸', summer: 'Лето ☀️', autumn: 'Осень 🍂', winter: 'Зима ❄️' };

    let selectedTheme = AIDietThemes.getCurrent();

    function renderThemes() {
      const list = AIDietThemes.getThemeList();
      const container = document.getElementById('themesContent');
      
      // Group by tier
      const baseThemes = list.filter(t => t.tier === 'base');
      const blackThemes = list.filter(t => t.tier === 'black');
      const goldThemes = list.filter(t => t.tier === 'gold');

      let html = '';

      html += renderSection('Базовые', baseThemes);
      html += renderSection('Black', blackThemes);
      html += renderSection('Gold', goldThemes);

      container.innerHTML = html;
      updateApplyBtn();
    }

    function renderSection(label, themes) {
      let html = `<div class="section-label">${label}</div><div class="theme-grid">`;
      themes.forEach(t => {
        const c = previewColors[t.id] || previewColors.light;
        const isActive = t.id === selectedTheme;
        const classes = `theme-card${isActive ? ' active' : ''}${t.locked ? ' locked' : ''}`;
        
        html += `<div class="${classes}" data-theme="${t.id}" onclick="selectTheme('${t.id}', ${t.locked})">`;
        html += `<div class="active-check"><i class="ph ph-check"></i></div>`;
        
        if (t.locked) {
          html += `<div class="lock-overlay"><i class="ph ph-lock-simple lock-icon"></i><span class="lock-text">Нужен ${t.requiredTier}</span></div>`;
        }
        
        // Mini preview
        html += `<div class="theme-preview" style="background:${c.bg};">`;
        html += `  <div class="preview-header" style="background:${c.header};border-bottom:1px solid ${c.muted};">`;
        html += `    <div class="preview-dot" style="background:${c.accent};"></div>`;
        html += `    <div class="preview-dot" style="background:${c.muted};"></div>`;
        html += `  </div>`;
        html += `  <div class="preview-body">`;
        html += `    <div class="preview-ring" style="border-color:${c.accent};color:${c.text};">AI</div>`;
        html += `    <div class="preview-bars">`;
        html += `      <div class="preview-bar" style="background:${c.accent};"></div>`;
        html += `      <div class="preview-bar" style="background:${c.muted};"></div>`;
        html += `      <div class="preview-bar" style="background:${c.accent};opacity:0.5;"></div>`;
        html += `    </div>`;
        html += `    <div class="preview-card-mock" style="background:${c.card};border:1px solid ${c.muted};"></div>`;
        html += `    <div class="preview-card-mock" style="background:${c.card};border:1px solid ${c.muted};"></div>`;
        html += `  </div>`;
        html += `</div>`;
        
        html += `<div class="theme-info">`;
        html += `  <div class="theme-name">${t.name}</div>`;
        if (t.id === 'seasonal') {
          const season = AIDietThemes._getCurrentSeason();
          html += `<div class="season-badge">${seasonNames[season]}</div>`;
        }
        if (t.requiredTier) {
          const badgeClass = t.tier === 'gold' ? 'badge-gold' : 'badge-black';
          html += `<span class="theme-tier-badge ${badgeClass}">${t.requiredTier}</span>`;
        }
        html += `</div>`;
        
        html += `</div>`;
      });
      html += `</div>`;
      return html;
    }

    function selectTheme(id, locked) {
      if (locked) {
        // Показываем экран статусов
        if (confirm('Эта тема доступна на более высоком статусе. Повысить статус?')) {
          location.href = 'u12-subscription.html';
        }
        return;
      }
      selectedTheme = id;
      // Обновляем визуал
      document.querySelectorAll('.theme-card').forEach(card => {
        card.classList.toggle('active', card.dataset.theme === id);
      });
      // Живой превью — применяем тему на текущий экран
      AIDietThemes.apply(id);
      updateApplyBtn();
    }

    function updateApplyBtn() {
      const btn = document.getElementById('applyBtn');
      const current = AIDietThemes.getCurrent();
      btn.disabled = (selectedTheme === current);
      btn.textContent = btn.disabled ? 'Уже применена' : 'Применить';
    }

    function applyTheme() {
      AIDietThemes.switchTo(selectedTheme);
      updateApplyBtn();
      // Микро-фидбэк
      const btn = document.getElementById('applyBtn');
      btn.textContent = '✓ Применена!';
      setTimeout(() => updateApplyBtn(), 1500);
    }

    // Init
    renderThemes();
  </script>
</body>
</html>
