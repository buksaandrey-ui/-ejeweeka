<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>O-17 Variant 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="stylesheet" href="global.css">
  <style>
    body { background: #000; color: #fff; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
    .phone { background: #000; height: 100vh; display: flex; flex-direction: column; position: relative; }
    .status-bar { color: #fff; }
    .gold-card-container { perspective: 1000px; margin: 60px auto 40px; width: 280px; height: 180px; position: relative; }
    .gold-card { width: 100%; height: 100%; border-radius: 20px; background: linear-gradient(135deg, #FFD700 0%, #F5922B 50%, #E85D04 100%); box-shadow: 0 20px 40px rgba(245, 146, 43, 0.3); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; transform: rotateY(-15deg) rotateX(10deg); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0% { transform: rotateY(-15deg) rotateX(10deg) translateY(0px); } 50% { transform: rotateY(-5deg) rotateX(5deg) translateY(-10px); } 100% { transform: rotateY(-15deg) rotateX(10deg) translateY(0px); } }
    .card-logo { font-size: 16px; font-weight: 800; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .card-chip { width: 40px; height: 30px; background: rgba(255,255,255,0.3); border-radius: 6px; margin-top: 20px; }
    .card-tier { font-size: 24px; font-weight: 800; color: #fff; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.2); align-self: flex-end; }
    .content-wrapper { padding: 0 24px; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 40px; }
    .title { font-size: 32px; font-weight: 800; line-height: 1.1; margin-bottom: 12px; background: linear-gradient(to right, #fff, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 15px; color: #A0A0A0; line-height: 1.5; margin-bottom: 40px; }
    .btn-activate { width: 100%; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #F5922B, #E85D04); color: #fff; font-size: 17px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(245, 146, 43, 0.4); }
    .disclaimer { font-size: 12px; color: #666; text-align: center; margin-top: 16px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><div><i class="ph ph-wifi-high"></i> <i class="ph ph-battery-full"></i></div></div>

    <div class="gold-card-container">
      <div class="gold-card">
        <div class="card-logo">HEALTH CODE</div>
        <div class="card-chip"></div>
        <div class="card-tier">STATUS GOLD</div>
      </div>
    </div>
    
    <div class="content-wrapper">
      <h1 class="title">Твой статус — Gold</h1>
      <p class="subtitle">Доступ к биохакинг-алгоритмам, фото-аналитике и персональным тренировкам открыт.</p>
      
      <button class="btn-activate">Войти в систему</button>
      
      <p class="disclaimer">Первые 72 часа — полный Gold-доступ. Управление статусом — через ассистента в Telegram.</p>
    </div>
  </div>

<script>
// Универсальный фильтр фичей статуса
document.addEventListener('DOMContentLoaded', () => {
    try {
        const raw = localStorage.getItem('aidiet_profile');
        if (!raw) return;
        const p = JSON.parse(raw);
        
        const _meds = p['takes_medications'] || p['takes_medication']; const noMeds = (!_meds || _meds === 'Нет' || _meds === 'false');
        const _supps = p['currently_takes_supplements'] || p['takes_supplements']; const noSupps = (!_supps || _supps === 'Нет' || _supps === 'false');
        const actFreq = p['activity_frequency'];
        const noTrain = (!actFreq || actFreq === 'Не готов(а) сейчас' || actFreq === 'Не готов сейчас');

        const walkDOM = (node, func) => {
            func(node);
            node = node.firstChild;
            while (node) {
                walkDOM(node, func);
                node = node.nextSibling;
            }
        };

        walkDOM(document.body, (node) => {
            if (node.nodeType === 3) { // Text node
                const text = node.nodeValue.toLowerCase();
                
                // Лекарства -> заменяем
                if (noMeds && text.includes('лекарств') && text.includes('совместимость')) {
                    node.nodeValue = 'Интеграция с Health Connect и трекерами активности';
                }
                
                // Витамины -> скрываем родителя
                if (noSupps && (text.includes('витаминов') || text.includes('бадов')) && !node.parentElement.closest('#dynamicPlanBullet')) {
                    // Ищем ближайший контейнер-строку (обычно div)
                    const row = node.parentElement.closest('div');
                    if (row && row.children.length > 0 && row.innerText.length < 100) {
                        row.style.display = 'none';
                    }
                }
                
                // Тренировки -> скрываем родителя
                if (noTrain && text.includes('тренировк') && !node.parentElement.closest('#dynamicPlanBullet')) {
                    const row = node.parentElement.closest('div');
                    if (row && row.children.length > 0 && row.innerText.length < 100) {
                        row.style.display = 'none';
                    }
                }
            }
        });
    } catch(e) {
        console.warn('Error in status feature filter', e);
    }
});
</script>
</body>
</html>
