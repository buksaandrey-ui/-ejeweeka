<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDiet - PR-1 Progress (Style A)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --color-primary: #F5922B;
      --color-bg-main: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #6B7280;
      --color-divider: #E5E7EB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #E5E7EB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background-color: var(--color-bg-main);
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .status-bar {
      height: 47px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      flex-shrink: 0;
      z-index: 20;
    }
    .status-bar-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 100px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }
    .content::-webkit-scrollbar { display: none; }
    
    .nav-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    
    .switcher {
      display: flex;
      background-color: #F3F4F6;
      border-radius: 9999px;
      padding: 4px;
      gap: 4px;
    }
    .switch-tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.2s, background-color 0.2s;
    }
    .switch-tab:not(.active):hover {
      color: var(--color-text-primary);
      background-color: #E5E7EB;
    }
    .switch-tab.active {
      background-color: #FFFFFF;
      color: var(--color-text-primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .card {
      background-color: var(--color-surface);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 20px;
    }
    
    .chart-area {
      height: 140px;
      width: 100%;
      position: relative;
    }
    .chart-xaxis {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .current-val {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .diff {
      font-size: 14px;
      font-weight: 600;
      color: #10B981;
      display: flex;
      align-items: center;
    }
    
    .bar-chart {
      display: flex;
      align-items: flex-end;
      height: 100%;
      gap: 12px;
      justify-content: space-between;
      padding: 0 10px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      background: #F3F4F6;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      width: 100%;
      background: linear-gradient(180deg, #F59520 0%, #E07018 100%);
      border-radius: 6px;
      position: absolute;
      bottom: 0;
    }
    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
    }
    .leg-item { display: flex; align-items: center; gap: 6px; }
    .leg-dot { width: 8px; height: 8px; border-radius: 4px; }
    
    .locked-section {
      position: relative;
      margin-top: 12px;
    }
    .locked-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .locked-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .btn-outline {
      padding: 8px 24px;
      border-radius: 999px;
      border: 2px solid var(--color-primary);
      color: var(--color-primary);
      font-weight: 600;
      font-size: 14px;
      background: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover {
      background-color: var(--color-primary);
      color: #FFFFFF;
    }
    .bg-charts {
      display: flex;
      gap: 16px;
      opacity: 0.4;
    }
    .mini-chart {
      flex: 1;
      height: 100px;
      background: #F3F4F6;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mini-circle { width: 16px; height: 16px; border-radius: 8px; background: #D1D5DB; }
    .mini-line { width: 100%; height: 4px; background: #D1D5DB; border-radius: 2px; }
    
    .streak-card {
      background: linear-gradient(135deg, #FFF8F0 0%, #FFFFFF 100%);
      border: 1px solid #FFE0B2;
      align-items: center;
      text-align: center;
      gap: 8px;
    }
    .streak-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
    }
    
    /* Bottom Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background-color: var(--color-surface);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding: 12px 20px 0 20px;
      border-top: 1px solid var(--color-divider);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--color-text-tertiary);
      cursor: pointer;
      transition: color 0.2s;
    }
    .tab-item:not(.active):hover {
      color: var(--color-text-secondary);
    }
    .tab-item.active {
      color: var(--color-primary);
    }
    .tab-label {
      font-size: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="phone">
    
    <!-- Status Bar Mock -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i data-lucide="bar-chart-2" style="width: 16px; height: 16px;"></i>
        <i data-lucide="wifi" style="width: 16px; height: 16px;"></i>
        <i data-lucide="battery-full" style="width: 20px; height: 20px; transform: rotate(90deg);"></i>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">
      
      <div class="nav-header">
        <span class="header-title">Прогресс Андрея</span>
      </div>

      <div class="switcher">
        <div class="switch-tab active">Неделя</div>
        <div class="switch-tab">Месяц <i data-lucide="lock" style="width:12px; height:12px;"></i></div>
        <div class="switch-tab">3 месяца <i data-lucide="lock" style="width:12px; height:12px;"></i></div>
        <div class="switch-tab">Всё время <i data-lucide="lock" style="width:12px; height:12px;"></i></div>
      </div>

      <!-- Weight Card -->
      <div class="card">
        <div class="current-val">
          81.6 кг
          <span class="diff"><i data-lucide="arrow-down-right" style="width: 16px; height: 16px;"></i> 0.9 кг за неделю</span>
        </div>
        <div class="chart-area" style="margin-top: 16px;">
          <!-- SVG Line Chart Mock -->
          <svg width="100%" height="100%" viewBox="0 0 300 100" preserveAspectRatio="none">
            <polyline fill="none" stroke="url(#orange-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="0,20 50,25 100,30 150,15 200,40 250,55 300,75"></polyline>
            <circle cx="300" cy="75" r="5" fill="#F5922B" stroke="#FFF" stroke-width="2"></circle>
            <defs>
              <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F59520" />
                <stop offset="100%" stop-color="#E07018" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="chart-xaxis">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
      </div>

      <!-- Calories Card -->
      <div class="card">
        <div class="card-title" style="margin-bottom: 8px;">Калории</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#E5E7EB;"></div> План</div>
          <div class="leg-item"><div class="leg-dot" style="background:#F5922B;"></div> Факт</div>
        </div>
        <div class="chart-area">
          <div class="bar-chart">
            <div class="bar-col"><div class="bar-fill" style="height: 80%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 105%; background: linear-gradient(180deg, #EF4444 0%, #DC2626 100%);"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 90%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 95%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 85%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 100%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 70%;"></div></div>
          </div>
        </div>
        <div class="chart-xaxis">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
      </div>
      
      <!-- Locked Section -->
      <div class="locked-section">
        <div class="locked-overlay">
          <i data-lucide="lock" style="width: 24px; height: 24px; color: var(--color-text-primary);"></i>
          <span class="locked-text">Доступно в Black</span>
          <button class="btn-outline">Подробнее</button>
        </div>
        <div class="bg-charts">
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line"></div>
            <div class="mini-line" style="width:70%"></div>
          </div>
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line"></div>
            <div class="mini-line" style="width:40%"></div>
          </div>
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line"></div>
            <div class="mini-line" style="width:90%"></div>
          </div>
        </div>
      </div>

      <!-- Streak Card -->
      <div class="card streak-card">
        <i data-lucide="flame" style="width: 40px; height: 40px; color: #F5922B;"></i>
        <div class="streak-title">12 дней подряд</div>
        <div style="font-size:14px; color: var(--color-text-secondary);">Отличная серия! Так держать! 🎉</div>
      </div>

    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <i data-lucide="home" style="width: 24px; height: 24px;"></i>
        <span class="tab-label">Главная</span>
      </div>
      <div class="tab-item">
        <i data-lucide="layout-list" style="width: 24px; height: 24px;"></i>
        <span class="tab-label">Планы</span>
      </div>
      <div class="tab-item">
        <i data-lucide="camera" style="width: 24px; height: 24px;"></i>
        <span class="tab-label">Фото</span>
      </div>
      <div class="tab-item active">
        <i data-lucide="pie-chart" style="width: 24px; height: 24px;"></i>
        <span class="tab-label">Прогресс</span>
      </div>
      <div class="tab-item">
        <i data-lucide="user" style="width: 24px; height: 24px;"></i>
        <span class="tab-label">Профиль</span>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
