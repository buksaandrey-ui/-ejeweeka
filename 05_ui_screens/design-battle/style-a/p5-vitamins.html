<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDiet - P-5 Vitamin Schedule (Style A)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --color-primary: #F5922B;
      --color-bg-main: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #6B7280;
      --color-divider: #E0E0E0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #E5E7EB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background-color: var(--color-bg-main);
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .status-bar {
      height: 47px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      flex-shrink: 0;
      z-index: 20;
    }
    .status-bar-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge-premium {
      position: absolute;
      top: 55px;
      right: 24px;
      background: linear-gradient(135deg, #FFD700, #C8A96E);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      z-index: 30;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      -ms-overflow-style: none;  
      scrollbar-width: none;  
      position: relative;
    }
    .content::-webkit-scrollbar { display: none; }
    
    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      background: #FFFFFF;
      border: 1px solid var(--color-divider);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: var(--color-text-primary);
      transition: all 0.2s;
    }
    .icon-btn:hover { background: #F3F4F6; }
    .icon-btn:active { background: #E5E7EB; transform: scale(0.95); }
    
    .date-indicator {
      font-size: 15px;
      color: var(--color-text-secondary);
      font-weight: 500;
      margin-top: -16px;
    }

    .time-card {
      background-color: var(--color-surface);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 16px; 
    }
    .card-morning { background-color: #FFFDF8; }
    .card-day { background-color: #FFFFFF; }
    .card-evening { background-color: #F8FAFF; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    
    .vitamin-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
    }
    .vitamin-item:hover .item-title {
      color: var(--color-primary);
    }
    .checkbox {
      margin-top: 2px;
      appearance: none;
      min-width: 24px;
      width: 24px;
      height: 24px;
      border: 2px solid var(--color-text-secondary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
    }
    .vitamin-item:hover .checkbox:not(:checked) {
      border-color: var(--color-primary);
      background-color: #FFF3E0;
    }

    .checkbox:checked {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .checkbox:checked::after {
      content: "";
      width: 5px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      margin-bottom: 2px;
    }
    .item-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .item-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .item-dose {
      font-weight: 400;
      color: var(--color-text-secondary);
    }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      background-color: #F3F4F6;
      color: var(--color-text-secondary);
      font-weight: 500;
      display: inline-block;
      align-self: flex-start;
    }
    
    .warning-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .notice-card {
      padding: 16px;
      border-radius: 16px;
      display: flex;
      gap: 12px;
      background-color: #FFFFFF;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .notice-warning {
      border-left: 4px solid #F5922B;
    }
    .notice-info {
      border-left: 4px solid #42A5F5;
    }
    .notice-icon {
      flex-shrink: 0;
      margin-top: 2px;
    }
    .notice-text {
      font-size: 14px;
      color: var(--color-text-primary);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="phone">
    
    <!-- Status Bar Mock -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i data-lucide="bar-chart-2" style="width: 16px; height: 16px;"></i>
        <i data-lucide="wifi" style="width: 16px; height: 16px;"></i>
        <i data-lucide="battery-full" style="width: 20px; height: 20px; transform: rotate(90deg);"></i>
      </div>
    </div>

    <!-- Premium Badge -->
    <div class="badge-premium">Black</div>

    <!-- Scrollable Content -->
    <div class="content">
      
      <!-- Header -->
      <div class="nav-header">
        <button class="icon-btn">
          <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
        </button>
        <span class="header-title">Витамины для Андрея</span>
        <button class="icon-btn">
          <i data-lucide="calendar" style="width: 20px; height: 20px;"></i>
        </button>
      </div>

      <div class="date-indicator">Сегодня, 15 апреля</div>

      <!-- Morning Card -->
      <div class="time-card card-morning">
        <div class="card-header">
          <i data-lucide="sunrise" style="width: 22px; height: 22px; color: #F5922B;"></i>
          Утро
        </div>
        
        <label class="vitamin-item">
          <input type="checkbox" class="checkbox" checked>
          <div class="item-info">
            <div class="item-title">Витамин D3 <span class="item-dose">· 2000 МЕ</span></div>
            <div class="badge">после завтрака</div>
          </div>
        </label>

        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Омега-3 <span class="item-dose">· 1000 мг</span></div>
            <div class="badge">во время еды</div>
          </div>
        </label>

        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Витамин B12 <span class="item-dose">· 500 мкг</span></div>
            <div class="badge">до еды</div>
          </div>
        </label>
      </div>

      <!-- Day Card -->
      <div class="time-card card-day">
        <div class="card-header">
          <i data-lucide="sun" style="width: 22px; height: 22px; color: #F5922B;"></i>
          День
        </div>
        
        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Железо <span class="item-dose">· 18 мг</span></div>
            <div class="badge">между приёмами пищи</div>
          </div>
        </label>

        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Витамин C <span class="item-dose">· 500 мг</span></div>
            <div class="badge">вместе с железом</div>
          </div>
        </label>
      </div>

      <!-- Evening Card -->
      <div class="time-card card-evening">
        <div class="card-header">
          <i data-lucide="moon" style="width: 22px; height: 22px; color: #42A5F5;"></i>
          Вечер
        </div>
        
        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Магний <span class="item-dose">· 400 мг</span></div>
            <div class="badge">перед сном</div>
          </div>
        </label>

        <label class="vitamin-item">
          <input type="checkbox" class="checkbox">
          <div class="item-info">
            <div class="item-title">Кальций <span class="item-dose">· 500 мг</span></div>
            <div class="badge">после ужина</div>
          </div>
        </label>
      </div>

      <!-- Warnings -->
      <div class="warning-section">
        <div class="section-title">Совместимость</div>
        
        <div class="notice-card notice-warning">
          <i data-lucide="alert-triangle" class="notice-icon" style="color: #F5922B;"></i>
          <div class="notice-text">Кальций и Железо — принимай раздельно (интервал 2+ часа)</div>
        </div>

        <div class="notice-card notice-info">
          <i data-lucide="info" class="notice-icon" style="color: #42A5F5;"></i>
          <div class="notice-text">Витамин D лучше усваивается с жирной пищей</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
