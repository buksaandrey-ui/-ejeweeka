<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDiet - H-1 Дашборд (Style A)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --color-primary: #F5922B;
      --color-primary-gradient: linear-gradient(135deg, #F59520, #E07018);
      --color-gold-gradient: linear-gradient(135deg, #FFD700, #C8A96E);
      --color-bg-main: #FAFAFA;
      --color-surface: #FFFFFF;
      
      --color-protein: #52B044;
      --color-fat: #F09030;
      --color-carbs: #42A5F5;
      --color-water: #42A5F5;
      --color-weight: #8D6E63;
      
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #6B7280;
      --color-text-tertiary: #9E9E9E;
      --color-divider: #E0E0E0;
      --color-success-bg: #E8F5E2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: #E5E7EB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    
    .phone {
      width: 390px;
      height: 844px;
      background-color: var(--color-bg-main);
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 47px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      flex-shrink: 0;
      z-index: 20;
    }
    .status-bar-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 100px 0; 
      display: flex;
      flex-direction: column;
      gap: 24px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    .app-header {
      padding: 16px 20px 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .greeting {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .bell-icon {
      color: var(--color-text-primary);
      position: relative;
    }
    .bell-dot {
      position: absolute;
      top: 0;
      right: 2px;
      width: 8px;
      height: 8px;
      background-color: #EF4444;
      border-radius: 50%;
      border: 2px solid var(--color-bg-main);
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #D1D5DB;
      background-image: url('https://i.pravatar.cc/100?img=11');
      background-size: cover;
    }

    .week-switcher-container {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .date-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .week-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-circle {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-secondary);
      cursor: pointer;
    }
    .day-circle.active {
      background-color: var(--color-primary);
      color: #FFFFFF;
      box-shadow: 0 4px 12px rgba(245,146,43,0.3);
    }

    .card {
      background-color: var(--color-surface);
      border-radius: 20px;
      padding: 24px;
      margin: 0 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    
    .ring-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
    }
    .ring-svg {
      width: 160px;
      height: 160px;
      transform: rotate(-90deg);
    }
    .ring-text {
      position: absolute;
      text-align: center;
      display: flex;
      flex-direction: column;
    }
    .ring-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: 1;
    }
    .ring-label {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 4px;
    }

    .macros {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .macro-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
    }
    .macro-label {
      width: 60px;
      color: var(--color-text-secondary);
    }
    .macro-val {
      width: 70px;
      text-align: right;
      color: var(--color-text-primary);
    }
    .macro-track {
      flex: 1;
      height: 6px;
      background-color: var(--color-divider);
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      margin: 0 12px;
    }
    .macro-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 3px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text-primary);
      padding: 0 20px;
      margin-bottom: 16px;
    }

    .meal-slider {
      display: flex;
      gap: 16px;
      padding: 0 20px;
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .meal-slider::-webkit-scrollbar { display: none; }
    
    .meal-card {
      min-width: 260px;
      background-color: var(--color-surface);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .meal-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .meal-emoji {
      font-size: 32px;
      background-color: #F9FAFB;
      width: 56px;
      height: 56px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .meal-info {
      flex: 1;
    }
    .meal-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.2;
    }
    .meal-kcal {
      font-size: 13px;
      color: var(--color-text-secondary);
      font-weight: 500;
    }
    
    .meal-actions {
      display: flex;
      gap: 8px;
    }
    .btn-eat {
      flex: 1;
      height: 40px;
      border-radius: 9999px;
      background-color: var(--color-success-bg);
      color: var(--color-protein);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .btn-other {
      flex: 1;
      height: 40px;
      border-radius: 9999px;
      background-color: transparent;
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--color-divider);
      cursor: pointer;
    }

    .quick-actions {
      display: flex;
      justify-content: space-between;
      padding: 0 28px;
    }
    .action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .action-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: #FFFFFF;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .action-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    
    .action-circle.water { color: var(--color-water); }
    .action-circle.weight { color: var(--color-weight); }
    .action-circle.vitamins { color: var(--color-protein); }
    .action-circle.photo { color: var(--color-primary); }

    .lock-badge {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      background-color: var(--color-text-secondary);
      color: #FFFFFF;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid var(--color-bg-main);
    }

    .banner {
      margin: 0 20px;
      padding: 16px 20px;
      background-color: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .banner::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--color-gold-gradient);
    }
    .banner-text {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      line-height: 1.4;
    }
    .btn-small {
      height: 32px;
      padding: 0 16px;
      background: var(--color-gold-gradient);
      color: #FFFFFF;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      white-space: nowrap;
    }

    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background-color: #FFFFFF;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.04);
      display: flex;
      justify-content: space-around;
      padding: 12px 12px 30px 12px; 
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 10;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--color-text-tertiary);
    }
    .tab-item.active {
      color: var(--color-primary);
    }
    .tab-label {
      font-size: 11px;
      font-weight: 500;
    }

    .tab-item.active svg {
      fill: var(--color-primary);
      stroke: var(--color-primary);
    }
  </style>
</head>
