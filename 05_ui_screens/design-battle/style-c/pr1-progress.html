<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDiet - PR-1 Progress (Style C)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2/src/duotone/style.css">
  <style>
    :root {
      --color-primary: #F5922B;
      --color-primary-gradient: linear-gradient(135deg, #F59520, #E07018);
      --color-bg-page: linear-gradient(180deg, #FAFAFA 0%, #F0F4FF 100%);
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #5C6370;
      
      --color-glass-card: rgba(255, 255, 255, 0.65);
      --color-glass-border: rgba(255, 255, 255, 0.6);
      --color-glass-shadow: 0 4px 24px rgba(0, 0, 10, 0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #E5E7EB;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: var(--color-bg-page);
      border-radius: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .bg-shape-1 { position: absolute; top: -50px; left: -50px; width: 250px; height: 250px; background: rgba(66, 165, 245, 0.15); filter: blur(40px); border-radius: 50%; z-index: 0; pointer-events: none; }
    .bg-shape-2 { position: absolute; top: 300px; right: -80px; width: 300px; height: 300px; background: rgba(245, 146, 43, 0.1); filter: blur(50px); border-radius: 50%; z-index: 0; pointer-events: none; }

    .status-bar {
      height: 47px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      flex-shrink: 0;
      z-index: 20;
    }
    .status-bar-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 16px;
    }
    
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 100px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      -ms-overflow-style: none;  
      scrollbar-width: none;  
      z-index: 5;
    }
    .content::-webkit-scrollbar { display: none; }
    
    .nav-header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text-primary);
      text-shadow: 0 2px 10px rgba(0,0,0,0.02);
    }
    
    .switcher {
      display: flex;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
    }
    .switch-tab {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .switch-tab:not(.active):hover { color: var(--color-text-primary); background: rgba(255, 255, 255, 0.6); }
    .switch-tab.active {
      background: var(--color-primary-gradient);
      color: #FFFFFF;
      box-shadow: 0 4px 12px rgba(245,146,43,0.25);
    }
    .switch-tab.active i { color: #FFFFFF; }
    
    .card {
      background: var(--color-glass-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--color-glass-border);
      box-shadow: var(--color-glass-shadow);
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 20px;
    }
    
    .chart-area {
      height: 140px;
      width: 100%;
      position: relative;
    }
    .chart-xaxis {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }
    .current-val {
      font-size: 26px;
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: 4px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .diff {
      font-size: 14px;
      font-weight: 600;
      color: #10B981;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .bar-chart {
      display: flex;
      align-items: flex-end;
      height: 100%;
      gap: 12px;
      justify-content: space-between;
      padding: 0 10px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
      background: rgba(255,255,255,0.6);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      width: 100%;
      background: var(--color-primary-gradient);
      border-radius: 6px;
      position: absolute;
      bottom: 0;
      box-shadow: 0 0 8px rgba(245,146,43,0.3);
    }
    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
    }
    .leg-item { display: flex; align-items: center; gap: 6px; }
    .leg-dot { width: 8px; height: 8px; border-radius: 4px; }
    
    .locked-section {
      position: relative;
      margin-top: 12px;
    }
    .locked-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .locked-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
    }
    .btn-outline {
      padding: 8px 20px;
      border-radius: 12px;
      border: 1.5px solid var(--color-primary);
      color: var(--color-primary);
      font-weight: 600;
      font-size: 14px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover {
      background: var(--color-primary-gradient);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 12px rgba(245,146,43,0.3);
    }
    .bg-charts {
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0.3;
    }
    .mini-chart {
      height: 54px;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mini-circle { width: 24px; height: 24px; border-radius: 12px; background: rgba(0,0,0,0.1); }
    .mini-line { flex: 1; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; }
    
    .streak-card {
      background: linear-gradient(135deg, rgba(255,248,240,0.8), rgba(255,255,255,0.5));
      border-color: rgba(255,224,178,0.5);
      align-items: center;
      text-align: center;
      gap: 8px;
    }
    .streak-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text-primary);
      text-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    
    /* Bottom Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding: 12px 20px 0 20px;
      border-top: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
      z-index: 40;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: rgba(92, 99, 112, 0.8);
      transition: all 0.2s;
      cursor: pointer;
    }
    .tab-item:not(.active):hover { color: var(--color-primary); }
    .tab-item.active {
      color: var(--color-primary);
    }
    .tab-item i { font-size: 26px; }
    .tab-label {
      font-size: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="phone">
    
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <!-- Status Bar Mock -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-bar-icons">
        <i class="ph-duotone ph-cell-signal-medium"></i>
        <i class="ph-duotone ph-wifi-high"></i>
        <i class="ph-duotone ph-battery-full"></i>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="content">
      
      <div class="nav-header">
        <span class="header-title">Прогресс Андрея</span>
      </div>

      <div class="switcher">
        <div class="switch-tab active">Неделя</div>
        <div class="switch-tab">Месяц <i class="ph-duotone ph-lock"></i></div>
        <div class="switch-tab">3 месяца <i class="ph-duotone ph-lock"></i></div>
        <div class="switch-tab">Всё время <i class="ph-duotone ph-lock"></i></div>
      </div>

      <!-- Weight Card -->
      <div class="card">
        <div class="current-val">
          81.6 кг
          <span class="diff"><i class="ph-duotone ph-trend-down"></i> 0.9 кг за неделю</span>
        </div>
        <div class="chart-area" style="margin-top: 16px;">
          <!-- SVG Line Chart Mock -->
          <svg width="100%" height="100%" viewBox="0 0 300 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#F59520" />
                <stop offset="100%" stop-color="#E07018" />
              </linearGradient>
            </defs>
            <polyline fill="none" stroke="url(#line-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="0,30 50,35 100,40 150,25 200,50 250,65 300,85"></polyline>
            <circle cx="300" cy="85" r="6" fill="#F5922B" stroke="#FFF" stroke-width="3" style="filter: drop-shadow(0 2px 4px rgba(245,146,43,0.4))"></circle>
          </svg>
        </div>
        <div class="chart-xaxis">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
      </div>

      <!-- Calories Card -->
      <div class="card">
        <div class="card-title">Калории</div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:rgba(0,0,0,0.1);"></div> План</div>
          <div class="leg-item"><div class="leg-dot" style="background:#F5922B;"></div> Факт</div>
        </div>
        <div class="chart-area">
          <div class="bar-chart">
            <div class="bar-col"><div class="bar-fill" style="height: 80%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 105%; background: linear-gradient(180deg, #F87171 0%, #DC2626 100%);"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 90%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 95%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 85%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 100%;"></div></div>
            <div class="bar-col"><div class="bar-fill" style="height: 70%;"></div></div>
          </div>
        </div>
        <div class="chart-xaxis">
          <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
        </div>
      </div>
      
      <!-- Locked Section -->
      <div class="locked-section">
        <div class="locked-overlay">
          <i class="ph-duotone ph-lock" style="font-size: 28px; color: var(--color-text-primary);"></i>
          <span class="locked-text">Доступно в Black</span>
          <button class="btn-outline">Подробнее</button>
        </div>
        <div class="bg-charts">
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line" style="width:70%"></div>
          </div>
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line" style="width:40%"></div>
          </div>
          <div class="mini-chart">
            <div class="mini-circle"></div>
            <div class="mini-line" style="width:90%"></div>
          </div>
        </div>
      </div>

      <!-- Streak Card -->
      <div class="card streak-card">
        <i class="ph-duotone ph-fire" style="font-size: 42px; color: #F5922B; filter: drop-shadow(0 4px 8px rgba(245,146,43,0.3));"></i>
        <div class="streak-title">12 дней подряд</div>
        <div style="font-size:14px; color: var(--color-text-secondary);">Отличная серия! Так держать! 🎉</div>
      </div>

    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <i class="ph-duotone ph-house"></i>
        <span class="tab-label">Главная</span>
      </div>
      <div class="tab-item">
        <i class="ph-duotone ph-calendar-check"></i>
        <span class="tab-label">Планы</span>
      </div>
      <div class="tab-item">
        <i class="ph-duotone ph-camera"></i>
        <span class="tab-label">Фото</span>
      </div>
      <div class="tab-item active">
        <i class="ph-duotone ph-chart-pie-slice"></i>
        <span class="tab-label">Прогресс</span>
      </div>
      <div class="tab-item">
        <i class="ph-duotone ph-user"></i>
        <span class="tab-label">Профиль</span>
      </div>
    </div>
  </div>
</body>
</html>
